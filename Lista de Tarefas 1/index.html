<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Lista de Tarefas Interativas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📋 Lista de Tarefas 📋</h1>
        
        <input type="text" id="tarefa" placeholder="Digite sua tarefa...">
        
        <button id="btnAdicionar">Adicionar Tarefa</button>
        <button id="btnLimparTudo">🧹 Limpar todas as tarefas</button>
        
        <p>Total de tarefas: <span id="contador">0</span></p>
        
        <ul id="lista"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
